<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chico Geométrico</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Chico Geométrico</h1>
        <div id="game-container">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            <div class="controls">
                <p>Use arrow keys to move and jump. Collect coins!</p>
                <p>Level: <span id="level">1</span> | Score: <span id="score">0</span></p>
            </div>
        </div>
        <div id="congratulations" style="display: none;">
            <h2>¡Felicidades! Completaste todos los niveles.</h2>
            <p>Tu puntuación final: <span id="final-score">0</span></p>
            <button id="restart-btn">Volver al Inicio</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
